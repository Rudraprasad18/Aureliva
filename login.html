<!DOCTYPE html>
<html lang="en">
<head>
    <title>Aureliva - Premium Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --deep-navy: #0F1338;
            --cream: #F5F0E6;
            --dark-charcoal: #333333;
        }
        
        * {
            box-sizing: border-box;
        }

        body {
            background: var(--cream);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            margin: 0;
             background: linear-gradient(135deg, #F5F0E6 0%, #E8E1D1 100%);
            background-size: cover;
            background-position: center;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            font-size: 2.5rem;
            margin: 0 0 10px;
            color: var(--deep-navy);
            letter-spacing: 1px;
        }

        p {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            font-size: 14px;
            line-height: 1.6;
            letter-spacing: 0.5px;
            margin: 0 0 30px;
            color: var(--dark-charcoal);
        }

        a {
            color: var(--gold);
            font-size: 13px;
            text-decoration: none;
            margin: 15px 0;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        a:hover {
            text-decoration: underline;
        }

        button {
            border-radius: 30px;
            border: 2px solid var(--gold);
            background-color: var(--deep-navy);
            color: var(--cream);
            font-family: 'Montserrat', sans-serif;
            font-size: 12px;
            font-weight: 500;
            padding: 14px 45px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            cursor: pointer;
            outline: none;
        }

        button:hover {
            background-color: var(--gold);
            color: var(--deep-navy);
            border-color: var(--deep-navy);
        }

        button:active {
            transform: scale(0.95);
        }

        button.ghost {
            background-color: transparent;
            border-color: var(--cream);
            color: var(--cream);
        }

        button.ghost:hover {
            background-color: rgba(255,255,255,0.1);
        }

        form {
            background-color: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 50px;
            height: 100%;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        input {
            background-color: rgba(255,255,255,0.8);
            border: 1px solid rgba(0,0,0,0.1);
            padding: 14px 15px;
            margin: 10px 0;
            width: 100%;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
        }

        .container {
            background-color: transparent;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            width: 850px;
            max-width: 100%;
            min-height: 550px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
 
        .form-container {
            position: absolute;
            top: 0;
            height: 100%;
            transition: all 0.6s ease-in-out;
        }    
        
        .sign-in-container {
            left: 0;
            width: 50%;
            z-index: 2;
        }

        .container.right-panel-active .sign-in-container {
            transform: translateX(100%);
        }

        .sign-up-container {
            left: 0;
            width: 50%;
            opacity: 0;
            z-index: 1;
        }

        .container.right-panel-active .sign-up-container {
            transform: translateX(100%);
            opacity: 1;
            z-index: 5;
            animation: show 0.6s;
        }

        @keyframes show {
            0%, 49.99% {
                opacity: 0;
                z-index: 1;
            }
            
            50%, 100% {
                opacity: 1;
                z-index: 5;
            }
        }
            
        .overlay-container {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 100%;
            overflow: hidden;
            transition: transform 0.6s ease-in-out;
            z-index: 100;
        }

        .container.right-panel-active .overlay-container {
            transform: translateX(-100%);
        }

        .overlay {
            background: linear-gradient(135deg, rgba(15,19,56,0.9) 0%, rgba(15,19,56,0.7) 100%);
            color: var(--cream);
            position: relative;
            left: -100%;
            height: 100%;
            width: 200%;
            transform: translateX(0);
            transition: transform 0.6s ease-in-out;
        }

        .container.right-panel-active .overlay {
            transform: translateX(50%);
        }
      
        .overlay-panel p {
            color: rgba(220, 219, 215, 0.9);
            font-weight: 300;  /* Optional: Makes text thinner for elegance */
}
        .overlay-panel {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 50px;
            text-align: center;
            top: 0;
            height: 100%;
            width: 50%;
            transform: translateX(0);
            transition: transform 0.6s ease-in-out;
        }

        .overlay-left {
            transform: translateX(-20%);
        }

        .container.right-panel-active .overlay-left {
            transform: translateX(0);
        }

        .overlay-right {
            right: 0;
            transform: translateX(0);
        }

        .container.right-panel-active .overlay-right {
            transform: translateX(20%);
        }

        /* Luxury decorative elements */
        .overlay-panel::before {
            content: "";
            position: absolute;
            top: 40px;
            width: 60px;
            height: 2px;
            background: var(--gold);
        }

        .form-container h1::after {
            content: "";
            display: block;
            width: 40px;
            height: 2px;
            background: var(--gold);
            margin: 15px auto;
        }
    </style>
</head>
<body>
  <div style="position: absolute; top: 30px; left: 30px; z-index: 1000;">
    <img src="logo.png" alt="Aureliva" style="height: 76px;">
  </div>
    <div class="container" id="container">
        <div class="form-container sign-up-container">
            <form id="signupForm">
                <h1>Create Account</h1>
                <span style="font-family: 'Montserrat'; color: #9b1010;">Join Aureliva's exclusive community</span>
                <input type="text" id="signupName" placeholder="Full Name" required>
                <input type="email" id="signupEmail" placeholder="Email" required>
                <input type="password" id="signupPassword" placeholder="Password" required>
                <button type="submit">Become Member</button>
            </form>
        </div>
        <div class="form-container sign-in-container">
            <form id="loginForm">
                <h1>Welcome Back</h1>
                <span style="font-family: 'Montserrat'; color: #666;">Access your Aureliva account</span>
                <input type="text" id="loginUsername" placeholder="Username" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <a href="#">Forgot your password?</a>
                <button type="submit">Sign In</button>
            </form>
        </div>
        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>Welcome Back</h1>
                    <p>Access your curated collection of premium products</p>
                    <button class="ghost" id="signIn">Sign In</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>New Here?</h1>
                    <p>Begin your journey with Aureliva's exclusive offerings</p>
                    <button class="ghost" id="signUp">Join Now</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        // Animation Toggle
        const signUpButton = document.getElementById('signUp');
        const signInButton = document.getElementById('signIn');
        const container = document.getElementById('container');

        signUpButton.addEventListener('click', () => {
            container.classList.add('right-panel-active');
        });

        signInButton.addEventListener('click', () => {
            container.classList.remove('right-panel-active');
        });

        // Auth Logic
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            if (username && password) {
                localStorage.setItem('shopSmartUser', JSON.stringify({
                    username: username,
                    loggedIn: true,
                    premium: true // Mark as premium user
                }));
                
                window.location.href = 'dashboard.html';
            } else {
                alert('Please enter your credentials');
            }
        });

        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            
            if (name && email && password) {
                localStorage.setItem('shopSmartUser', JSON.stringify({
                    name: name,
                    email: email,
                    loggedIn: true,
                    premium: true,
                    joinDate: new Date().toLocaleDateString()
                }));
                
                alert('Welcome to Aureliva. Your premium account is ready!');
                window.location.href = 'dashboard.html';
            } else {
                alert('Please complete all fields');
            }
        });
    </script>
</body>
</html>
