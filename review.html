<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AURELIVA - Write Review</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
      --primary-color: #1a1a1a;
      --gold-accent: #c19a6b;
      --gold-light: #e6d5b8;
      --text-light: #ffffff;
      --bg-light: #f8f5f0;
      --bg-dark: #121212;
      --border-radius: 8px;
      --box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      --transition: all 0.3s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background-color: var(--bg-light);
      color: var(--primary-color);
      line-height: 1.6;
    }

    body.dark-mode {
      background-color: var(--bg-dark);
      color: var(--text-light);
    }

    /* Header */
    header {
      background-color: var(--primary-color);
      padding: 1.5rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--gold-accent);
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 1rem;
      text-decoration: none;
    }

    .logo-container img {
      height: 40px;
    }

    .logo-text {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 1.8rem;
      color: var(--gold-accent);
      letter-spacing: 1px;
    }

    .header-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .header-btn {
      background: transparent;
      color: var(--gold-light);
      border: 1px solid var(--gold-accent);
      padding: 0.5rem 1.5rem;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border-radius: 30px;
      transition: var(--transition);
    }

    .header-btn:hover {
      background: rgba(193,154,107,0.1);
    }

    .header-btn i {
      font-size: 1.1rem;
      color: var(--gold-accent);
    }

    /* Hero Section */
    .review-hero {
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                  url('https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
      background-size: cover;
      background-position: center;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      margin-bottom: 3rem;
    }

    .review-hero-content h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      margin-bottom: 1rem;
      color: var(--gold-accent);
      text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    }

    .review-hero-content p {
      color: var(--text-light);
      font-size: 1.2rem;
      max-width: 600px;
      margin: 0 auto;
    }

    /* Review Form */
    .review-container {
      max-width: 800px;
      margin: 3rem auto;
      padding: 0 5%;
    }

    .review-form {
      background: var(--bg-light);
      border-radius: var(--border-radius);
      padding: 3rem;
      box-shadow: var(--box-shadow);
      border: 1px solid var(--gold-light);
    }

    body.dark-mode .review-form {
      background: rgba(26,26,26,0.8);
      border-color: rgba(193,154,107,0.2);
    }

    .form-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 2rem;
      color: var(--primary-color);
      text-align: center;
      position: relative;
    }

    body.dark-mode .form-title {
      color: var(--text-light);
    }

    .form-title:after {
      content: '';
      display: block;
      width: 60px;
      height: 2px;
      background: var(--gold-accent);
      margin: 15px auto;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--primary-color);
    }

    body.dark-mode .form-group label {
      color: var(--gold-light);
    }

    .form-control {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 1px solid var(--gold-light);
      border-radius: var(--border-radius);
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      transition: var(--transition);
      background-color: white;
    }

    body.dark-mode .form-control {
      background: rgba(255,255,255,0.05);
      border-color: rgba(193,154,107,0.3);
      color: var(--text-light);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--gold-accent);
      box-shadow: 0 0 0 2px rgba(193,154,107,0.2);
    }

    textarea.form-control {
      min-height: 150px;
      resize: vertical;
    }

    /* Rating Stars */
    .rating-container {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1rem;
    }

    .rating-stars {
      display: flex;
      gap: 5px;
    }

    .rating-star {
      color: #ddd;
      font-size: 1.5rem;
      cursor: pointer;
      transition: var(--transition);
    }

    .rating-star:hover,
    .rating-star.active {
      color: var(--gold-accent);
    }

    /* Photo Upload */
    .photo-upload {
      margin-top: 1rem;
    }

    .upload-area {
      border: 2px dashed var(--gold-light);
      border-radius: var(--border-radius);
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: var(--transition);
      margin-bottom: 1rem;
    }

    .upload-area:hover {
      border-color: var(--gold-accent);
      background: rgba(193,154,107,0.05);
    }

    .upload-area i {
      font-size: 2rem;
      color: var(--gold-accent);
      margin-bottom: 0.5rem;
    }

    .upload-text {
      color: var(--primary-color);
      margin-bottom: 0.5rem;
    }

    body.dark-mode .upload-text {
      color: var(--text-light);
    }

    .upload-hint {
      font-size: 0.8rem;
      color: #777;
    }

    body.dark-mode .upload-hint {
      color: #aaa;
    }

    .preview-container {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 1rem;
    }

    .preview-item {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 4px;
      overflow: hidden;
    }

    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .remove-photo {
      position: absolute;
      top: 5px;
      right: 5px;
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.7rem;
    }

    /* Submit Button */
    .btn-submit {
      background: var(--gold-accent);
      color: var(--primary-color);
      border: none;
      padding: 1rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 30px;
      cursor: pointer;
      transition: var(--transition);
      display: block;
      width: 100%;
      margin-top: 2rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .btn-submit:hover {
      background: #d8b480;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(193,154,107,0.3);
    }

    /* Footer */
    footer {
      background-color: var(--primary-color);
      color: var(--text-light);
      padding: 3rem 5%;
      text-align: center;
      border-top: 1px solid var(--gold-accent);
    }

    .footer-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .footer-logo {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .footer-logo img {
      height: 30px;
    }

    .footer-logo-text {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--gold-accent);
    }

    .footer-social {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .social-icon {
      color: var(--gold-light);
      font-size: 1.2rem;
      transition: var(--transition);
    }

    .social-icon:hover {
      color: var(--gold-accent);
    }

    .copyright {
      font-size: 0.9rem;
      color: var(--gold-light);
      opacity: 0.7;
    }

    @media (max-width: 768px) {
      .logo-text {
        font-size: 1.5rem;
      }
      
      .header-btn span {
        display: none;
      }
      
      .review-form {
        padding: 2rem;
      }
      
      .review-hero-content h1 {
        font-size: 2.2rem;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <a href="index.html" class="logo-container">
      <img src="logo.png" alt="AURELIVA">
      <div class="logo-text">AURELIVA</div>
    </a>
    
    <div class="header-actions">
     <button class="header-btn" onclick="window.location.href='dashboard.html'">
        <i class="fas fa-store"></i>
        <span>Home</span>
    </button>
    <button class="header-btn" id="toggle-dark-mode">
        <i class="fas fa-moon"></i>
        <span>Dark Mode</span>
    </button> 
    </div>
  </header>

  <!-- Hero Section -->
  <section class="review-hero">
    <div class="review-hero-content">
      <h1>Share Your Experience</h1>
      <p>Your feedback helps us maintain our exceptional standards of quality and service</p>
    </div>
  </section>

  <!-- Review Form -->
  <div class="review-container">
    <form class="review-form" id="reviewForm">
      <h2 class="form-title">Write a Review</h2>
      
      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" class="form-control" required>
      </div>
      
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-control" required>
      </div>
      
      <div class="form-group">
        <label>Your Rating</label>
        <div class="rating-container">
          <div class="rating-stars" id="ratingStars">
            <i class="fas fa-star rating-star" data-rating="1"></i>
            <i class="fas fa-star rating-star" data-rating="2"></i>
            <i class="fas fa-star rating-star" data-rating="3"></i>
            <i class="fas fa-star rating-star" data-rating="4"></i>
            <i class="fas fa-star rating-star" data-rating="5"></i>
          </div>
          <span id="ratingText">0/5</span>
          <input type="hidden" id="rating" name="rating" value="0" required>
        </div>
      </div>
      
      <div class="form-group">
        <label for="review-title">Review Title</label>
        <input type="text" id="review-title" class="form-control" placeholder="Summarize your experience" required>
      </div>
      
      <div class="form-group">
        <label for="review-text">Your Review</label>
        <textarea id="review-text" class="form-control" placeholder="Tell us about your experience with this product..." required></textarea>
      </div>
      
      <div class="form-group">
        <label>Upload Photo</label>
        <div class="photo-upload">
          <div class="upload-area" id="uploadArea">
            <i class="fas fa-camera"></i>
            <div class="upload-text">Click to upload photo</div>
            <div class="upload-hint">(Add your photo)</div>
          </div>
          <input type="file" id="photoUpload" accept="image" multiple style="display: none;">
          <div class="preview-container" id="previewContainer"></div>
        </div>
      </div>
      
      <button type="submit" class="btn-submit">Submit Review</button>
    </form>
  </div>

  <!-- Footer -->
  <footer>
    <div class="footer-content">
      <div class="footer-logo">
        <img src="logo.png" alt="AURELIVA">
        <div class="footer-logo-text">AURELIVA</div>
      </div>
      
      <div class="footer-social">
        <a href="#" class="social-icon"><i class="fab fa-instagram"></i></a>
        <a href="#" class="social-icon"><i class="fab fa-pinterest-p"></i></a>
        <a href="#" class="social-icon"><i class="fab fa-linkedin-in"></i></a>
      </div>
      
      <div class="copyright">
        &copy; 2023 AURELIVA. All rights reserved.
      </div>
    </div>
  </footer>

  <script>
    // Dark mode toggle
    document.getElementById('toggle-dark-mode').addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
      
      // Toggle moon/sun icon
      const icon = document.querySelector('#toggle-dark-mode i');
      if (document.body.classList.contains('dark-mode')) {
        icon.classList.remove('fa-moon');
        icon.classList.add('fa-sun');
      } else {
        icon.classList.remove('fa-sun');
        icon.classList.add('fa-moon');
      }
    });

    // Check for saved dark mode preference
    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark-mode');
      const icon = document.querySelector('#toggle-dark-mode i');
      icon.classList.remove('fa-moon');
      icon.classList.add('fa-sun');
    }

    // Star rating functionality
    const stars = document.querySelectorAll('.rating-star');
    const ratingText = document.getElementById('ratingText');
    const ratingInput = document.getElementById('rating');
    
    stars.forEach(star => {
      star.addEventListener('click', () => {
        const rating = star.getAttribute('data-rating');
        ratingInput.value = rating;
        ratingText.textContent = `${rating}/5`;
        
        stars.forEach((s, index) => {
          if (index < rating) {
            s.classList.add('active');
          } else {
            s.classList.remove('active');
          }
        });
      });
      
      star.addEventListener('mouseover', () => {
        const hoverRating = star.getAttribute('data-rating');
        
        stars.forEach((s, index) => {
          if (index < hoverRating) {
            s.style.color = 'var(--gold-accent)';
          }
        });
      });
      
      star.addEventListener('mouseout', () => {
        const currentRating = ratingInput.value;
        
        stars.forEach((s, index) => {
          if (index >= currentRating) {
            s.style.color = '#ddd';
          }
        });
      });
    });

    // Photo upload functionality
    const uploadArea = document.getElementById('uploadArea');
    const photoUpload = document.getElementById('photoUpload');
    const previewContainer = document.getElementById('previewContainer');
    const maxPhotos = 5;
    let uploadedPhotos = [];

    uploadArea.addEventListener('click', () => {
      photoUpload.click();
    });

    photoUpload.addEventListener('change', (e) => {
      const files = Array.from(e.target.files);
      
      // Check if total photos would exceed limit
      if (uploadedPhotos.length + files.length > maxPhotos) {
        alert(`You can upload maximum ${maxPhotos} photos.`);
        return;
      }
      
      // Process each file
      files.forEach(file => {
        if (!file.type.match('image.*')) {
          return;
        }
        
        const reader = new FileReader();
        
        reader.onload = (event) => {
          const photo = {
            id: Date.now(),
            src: event.target.result,
            file: file
          };
          
          uploadedPhotos.push(photo);
          renderPreview(photo);
        };
        
        reader.readAsDataURL(file);
      });
      
      // Reset file input
      photoUpload.value = '';
    });

    function renderPreview(photo) {
      const previewItem = document.createElement('div');
      previewItem.className = 'preview-item';
      previewItem.dataset.id = photo.id;
      
      previewItem.innerHTML = `
        <img src="${photo.src}" alt="Preview">
        <button class="remove-photo">&times;</button>
      `;
      
      previewContainer.appendChild(previewItem);
      
      // Add remove functionality
      const removeBtn = previewItem.querySelector('.remove-photo');
      removeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        removePhoto(photo.id);
      });
    }

    function removePhoto(id) {
      uploadedPhotos = uploadedPhotos.filter(photo => photo.id !== id);
      document.querySelector(`.preview-item[data-id="${id}"]`).remove();
    }

    // Form submission
const reviewForm = document.getElementById('reviewForm');

reviewForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  
  // Get form values
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const rating = document.getElementById('rating').value;
  const title = document.getElementById('review-title').value;
  const reviewText = document.getElementById('review-text').value;
  
  // Create FormData for file upload
  const formData = new FormData();
  formData.append('name', name);
  formData.append('email', email);
  formData.append('rating', rating);
  formData.append('title', title);
  formData.append('reviewText', reviewText);
  
  // Append photos
  uploadedPhotos.forEach(photo => {
    formData.append('photos', photo.file);
  });

  try {
    const response = await fetch('http://localhost:5000/api/reviews', {
      method: 'POST',
      body: formData
    });

    if (!response.ok) {
      throw new Error('Failed to submit review');
    }

    const result = await response.json();
    
    // Show success message
    alert(`Thank you ${name}! Your ${rating}-star review has been submitted.`);
    
    // Reset form
    reviewForm.reset();
    ratingInput.value = '0';
    ratingText.textContent = '0/5';
    stars.forEach(star => star.classList.remove('active'));
    uploadedPhotos = [];
    previewContainer.innerHTML = '';
    
  } catch (error) {
    console.error('Error submitting review:', error);
    alert('There was an error submitting your review. Please try again.');
  }
});
  </script>
</body>
</html>
