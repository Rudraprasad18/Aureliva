<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AURELIVA - A Premium Product Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="style.css" />
  <style>
    :root {
      --primary-color: #1a1a1a;
      --secondary-color: #f5f5f5;
      --accent-color: #c19a6b;
      --text-dark: #333;
      --text-light: #f5f5f5;
      --bg-light: #ffffff;
      --bg-dark: #121212;
      --border-radius: 8px;
      --box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      --transition: all 0.3s ease;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--bg-light);
      color: var(--text-dark);
      transition: var(--transition);
    }

    body.dark {
      background-color: var(--bg-dark);
      color: var(--text-light);
    }

    header {
      background-color: var(--primary-color);
      color: var(--text-light);
      padding: 1.5rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.2);
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 1rem;
      text-decoration: none;
    }

    .logo-container img {
      height: 50px;
      transition: var(--transition);
    }

    .logo-text {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 1.8rem;
      color: var(--text-light);
      letter-spacing: 1px;
    }

    .logo-text span {
      color: var(--accent-color);
    }

    nav {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    nav button, #sort-select {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: var(--text-light);
      padding: 0.6rem 1.2rem;
      border-radius: var(--border-radius);
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
    }

    nav button:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    #sort-select {
      padding: 0.6rem;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 0.5rem center;
      background-size: 1rem;
      padding-right: 2rem;
    }

    #cart-icon {
      position: relative;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1rem;
      background: rgba(255, 255, 255, 0.1);
      border-radius: var(--border-radius);
      transition: var(--transition);
    }

    #cart-icon:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    #cart-count {
      background-color: var(--accent-color);
      color: var(--primary-color);
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 600;
    }

    main {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 2rem;
      padding: 2rem 5%;
      max-width: 1600px;
      margin: 0 auto;
    }

    #controls {
      margin-bottom: 2rem;
    }

    #filter-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }

    #filter-buttons button {
      background: transparent;
      border: 1px solid var(--accent-color);
      color: var(--accent-color);
      padding: 0.5rem 1.2rem;
      border-radius: 20px;
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
    }

    #filter-buttons button.active, #filter-buttons button:hover {
      background: var(--accent-color);
      color: var(--text-light);
    }

    #search-input {
      width: 100%;
      padding: 0.8rem 1.2rem;
      border: 1px solid #ddd;
      border-radius: var(--border-radius);
      font-family: 'Montserrat', sans-serif;
      transition: var(--transition);
    }

    #search-input:focus {
      outline: none;
      border-color: var(--accent-color);
      box-shadow: 0 0 0 2px rgba(193, 154, 107, 0.2);
    }

    #product-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
    }

    .product-card {
      background: var(--bg-light);
      border-radius: var(--border-radius);
      overflow: hidden;
      box-shadow: var(--box-shadow);
      transition: var(--transition);
      cursor: pointer;
      position: relative;
    }

    body.dark .product-card {
      background: rgba(255, 255, 255, 0.05);
    }

    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
    }

    .product-image {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    }

    .product-info {
      padding: 1.5rem;
    }

    .product-name {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      margin: 0 0 0.5rem;
      font-size: 1.1rem;
      color: var(--text-dark);
    }

    body.dark .product-name {
      color: var(--text-light);
    }

    .product-price {
      font-weight: 600;
      color: var(--accent-color);
      margin-bottom: 1rem;
      font-size: 1.1rem;
    }

    .btn-add {
      width: 100%;
      padding: 0.8rem;
      background-color: var(--accent-color);
      color: white;
      border: none;
      border-radius: var(--border-radius);
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-add:hover {
      background-color: #b08a5d;
    }

    /* Cart styles */
    #cart {
      background: var(--bg-light);
      border-radius: var(--border-radius);
      padding: 1.5rem;
      box-shadow: var(--box-shadow);
      position: sticky;
      top: 100px;
      height: fit-content;
    }

    body.dark #cart {
      background: rgba(255, 255, 255, 0.05);
    }

    #cart h2 {
      font-family: 'Playfair Display', serif;
      margin-top: 0;
      margin-bottom: 1.5rem;
      color: var(--accent-color);
      font-size: 1.5rem;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      padding-bottom: 0.5rem;
    }

    #cart-items {
      margin-bottom: 1.5rem;
      max-height: 400px;
      overflow-y: auto;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr auto;
      gap: 0.5rem;
      align-items: center;
      padding: 0.8rem 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    .cart-item-name {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-qty {
      background: transparent;
      border: 1px solid #ddd;
      width: 25px;
      height: 25px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-qty:hover {
      background: #f0f0f0;
    }

    body.dark .btn-qty {
      border-color: #444;
    }

    body.dark .btn-qty:hover {
      background: #222;
    }

    .cart-item-qty {
      display: inline-block;
      width: 25px;
      text-align: center;
    }

    .cart-item-price {
      font-weight: 600;
      color: var(--accent-color);
      text-align: right;
    }

    .btn-remove {
      background: transparent;
      border: none;
      color: #ff6b6b;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0 0.5rem;
    }

    #cart-total {
      font-weight: 700;
      font-size: 1.2rem;
      text-align: right;
      margin-bottom: 1.5rem;
    }

    #checkout-btn {
      width: 100%;
      padding: 1rem;
      background-color: var(--accent-color);
      color: white;
      border: none;
      border-radius: var(--border-radius);
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    #checkout-btn:hover {
      background-color: #b08a5d;
    }

    #checkout-btn:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    /* Modal styles */
    #modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    #modal.active {
      opacity: 1;
      pointer-events: auto;
    }

    #modal-content {
      background-color: var(--bg-light);
      border-radius: var(--border-radius);
      width: 90%;
      max-width: 800px;
      max-height: 90vh;
      overflow: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      position: relative;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    body.dark #modal-content {
      background-color: var(--bg-dark);
    }

    #modal-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: var(--border-radius) 0 0 var(--border-radius);
    }

    #modal-details {
      padding: 2rem;
    }

    #modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      margin-top: 0;
      margin-bottom: 1rem;
      color: var(--accent-color);
    }

    #modal-description {
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .modal-price {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent-color);
      margin-bottom: 2rem;
    }

    #modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: transparent;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-dark);
    }

    body.dark #modal-close {
      color: var(--text-light);
    }

    /* Toast styles */
    #toast-container {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 1000;
    }

    .toast {
      background-color: var(--primary-color);
      color: white;
      padding: 1rem 1.5rem;
      border-radius: var(--border-radius);
      margin-bottom: 1rem;
      box-shadow: var(--box-shadow);
      opacity: 1;
      transition: opacity 0.4s ease;
    }

    /* Responsive adjustments */
    @media (max-width: 1024px) {
      main {
        grid-template-columns: 1fr;
      }

      #cart {
        position: static;
        margin-top: 2rem;
      }

      #modal-content {
        grid-template-columns: 1fr;
      }

      #modal-image {
        height: 300px;
        border-radius: var(--border-radius) var(--border-radius) 0 0;
      }
    }

    @media (max-width: 768px) {
      header {
        flex-direction: column;
        gap: 1rem;
        padding: 1rem;
      }

      nav {
        width: 100%;
        justify-content: space-between;
      }

      #product-list {
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      }
    }

    @media (max-width: 480px) {
      #filter-buttons {
        justify-content: center;
      }

      .product-card {
        max-width: 100%;
      }
    }
  </style>
</head>

<body>
  <header>
    <a href="#" class="logo-container">
      <img src="logo.png" alt="AURELIVA" />
      <div class="logo-text">AURELIVA</div>
    </a>
    <nav>
      <button id="btnClearCart" title="Clear Cart"><i class="fas fa-trash-alt"></i> Clear</button>
      <div id="cart-icon" role="button" tabindex="0" aria-label="Open shopping cart" title="Open Cart">
        <i class="fas fa-shopping-bag"></i> <span id="cart-count" aria-live="polite" aria-atomic="true">0</span>
      </div>
      <a href="dashboard.html"> Home </a>
      <select id="sort-select" aria-label="Sort products">
        <option value="default">Sort By</option>
        <option value="priceAsc">Price: Low to High</option>
        <option value="priceDesc">Price: High to Low</option>
        <option value="nameAsc">Name: A to Z</option>
        <option value="nameDesc">Name: Z to A</option>
      </select>
      <button id="toggle-dark-mode" title="Toggle Dark Mode"><i class="fas fa-moon"></i></button>
    </nav>
  </header>

  <main>
    <section>
      <div id="controls">
        <div id="filter-buttons" aria-label="Filter products by category"></div>
        <input type="search" id="search-input" placeholder="Search luxury products..." aria-label="Search products by name" />
      </div>
      <section id="product-list" aria-label="Product List"></section>
    </section>

    <aside id="cart" aria-label="Shopping Cart">
      <h2><i class="fas fa-shopping-bag"></i> Your Cart</h2>
      <div id="cart-items" role="list" tabindex="0" aria-live="polite" aria-relevant="additions removals"></div>
      <div id="cart-total">Total: ₹0.00</div>
      <button id="checkout-btn" disabled><i class="fas fa-credit-card"></i> Checkout</button>
    </aside>
  </main>

  <!-- Modal -->
  <div id="modal" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="modal-title">
    <div id="modal-content">
      <img src="" alt="" id="modal-image" />
      <div id="modal-details">
        <h3 id="modal-title"></h3>
        <p id="modal-description"></p>
        <div class="modal-price" id="modal-price"></div>
        <button class="btn-add" id="modal-add-to-cart">Add to Cart</button>
        <button id="modal-close"><i class="fas fa-times"></i></button>
      </div>
    </div>
  </div>
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script src="script.js"></script>
</body>
</html>
